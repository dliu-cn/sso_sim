# Shibboleth IdP Properties
# Placeholders are substituted by startup.sh at EC2 boot.

# Load additional property files — services.properties defines
# idp.httpclient.filecaching.cacheDirectory which global-system.xml requires.
idp.additionalProperties = /conf/ldap.properties, /conf/saml-nameid.properties, /conf/services.properties, /conf/authn/duo.properties

idp.entityID=https://__IDP_HOSTNAME__/idp/shibboleth
idp.scope=__IDP_HOSTNAME__
idp.serverName=__IDP_HOSTNAME__

# Running behind nginx reverse proxy
idp.server.keystore=
idp.server.keyAlias=

# Session / cookie settings
idp.session.cookieMaxAge=PT8H
idp.session.timeout=PT8H
idp.authn.flows=Password

# Logging
idp.loglevel.idp=INFO
idp.loglevel.ldap=WARN
idp.loglevel.messages=INFO
idp.loglevel.opensaml=INFO
