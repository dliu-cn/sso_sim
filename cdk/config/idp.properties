# Shibboleth IdP Properties
# Placeholders are substituted by startup.sh at EC2 boot.

# Load additional property files — services.properties defines
# idp.httpclient.filecaching.cacheDirectory which global-system.xml requires.
idp.additionalProperties = /conf/ldap.properties, /conf/saml-nameid.properties, /conf/services.properties, /conf/authn/duo.properties

idp.entityID=https://__IDP_HOSTNAME__/idp/shibboleth
idp.scope=__IDP_HOSTNAME__
idp.serverName=__IDP_HOSTNAME__

# Running behind nginx reverse proxy
idp.server.keystore=
idp.server.keyAlias=

# Signing and encryption credentials — generated by setup-shibboleth.sh into /opt/shibboleth-idp/credentials/
idp.signing.key = %{idp.home}/credentials/idp-signing.key
idp.signing.cert = %{idp.home}/credentials/idp-signing.crt
idp.encryption.key = %{idp.home}/credentials/idp-encryption.key
idp.encryption.cert = %{idp.home}/credentials/idp-encryption.crt
idp.sealer.storePassword = password
idp.sealer.keyPassword = password
# global-system.xml reads idp.sealer.storeResource / versionResource (not storeFile/versionFile).
# file:/// prefix forces Spring to use UrlResource (filesystem) instead of ServletContextResource.
idp.sealer.storeResource = file:///opt/shibboleth-idp/credentials/sealer.jks
idp.sealer.versionResource = file:///opt/shibboleth-idp/credentials/sealer.kver

# Session storage: explicitly use the server-side MemoryStorageService defined in global.xml.
# Default (shibboleth.StorageService) is client-side in this Docker image; client-side storage
# returns isServerSide()=false which silently blocks addSPSession() and leaves the secondary
# index empty, causing every SLO request to return UnknownPrincipal.
idp.session.StorageService = shibboleth.ServerSideStorage

# Session / cookie settings
# trackSPSessions records which SPs the user has authenticated with — required to populate
# the secondary index. Without it, no SP session records exist and SLO always returns SessionNotFound.
idp.session.trackSPSessions = true
# secondaryServiceIndex builds the SP+NameID → session lookup index used by SLO.
# The index key includes the NameID format, so the format in the assertion must match
# the format Cognito sends in its LogoutRequest (persistent).
idp.session.secondaryServiceIndex = true
idp.session.cookieMaxAge=PT8H
idp.session.timeout=PT8H
idp.authn.flows=Password

# Logging
idp.loglevel.idp=INFO
idp.loglevel.ldap=WARN
# DEBUG logs full SAML XML for both received (AuthnRequest/LogoutRequest) and sent (Assertion/LogoutResponse) messages
idp.loglevel.messages=DEBUG
idp.loglevel.opensaml=INFO
