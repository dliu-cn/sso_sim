# nginx reverse proxy for Shibboleth IdP.
# Handles TLS termination with Let's Encrypt cert.
# __IDP_HOSTNAME__ is substituted by startup.sh.

server {
    listen 80;
    server_name __IDP_HOSTNAME__;
    # Let's Encrypt HTTP challenge is handled by certbot before nginx starts.
    # Redirect all other HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name __IDP_HOSTNAME__;

    ssl_certificate     /etc/letsencrypt/live/__IDP_HOSTNAME__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__IDP_HOSTNAME__/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Shibboleth needs to know the real client info and that it's behind HTTPS.
    proxy_set_header  Host              $host;
    proxy_set_header  X-Real-IP         $remote_addr;
    proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header  X-Forwarded-Proto https;

    # Shibboleth Jetty runs on port 8080 (HTTP mode, no TLS).
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_read_timeout 60s;
    }
}
